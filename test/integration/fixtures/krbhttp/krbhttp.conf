<VirtualHost *:80>
    DocumentRoot /var/www/html
    LimitRequestFieldSize 65536

    LogLevel auth_gssapi:trace2

    <Location "/spnego">
        AuthType GSSAPI
        AuthName "GSSAPI Login"
        GssapiCredStore keytab:/etc/apache2/http.keytab
        GssapiAllowedMech krb5
        Require valid-user
    </Location>
</VirtualHost>
